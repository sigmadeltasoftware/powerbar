<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180">
  <style>
    @font-face { font-family: 'JetBrains Mono'; src: local('JetBrains Mono'), local('Menlo'), local('Monaco'), local('Consolas'); }
    text { font-family: 'JetBrains Mono', 'Menlo', 'Monaco', 'Consolas', monospace; font-size: 13px; }
    .bg { fill: #1a1b26; rx: 8; }
    .bold { font-weight: bold; }
    .dim { opacity: 0.5; }
    .white { fill: #dcdcdc; }
    .green { fill: #00a000; }
    .yellow { fill: #e6c800; }
    .cyan { fill: #2e9599; }
    .blue { fill: #0099ff; }
    .red { fill: #ff5555; }
    .orange { fill: #ffb055; }
    .dot-empty { fill: #dcdcdc; opacity: 0.3; }
    .title-bar { fill: #2a2b3d; }
    .title-dot-r { fill: #ff5f56; }
    .title-dot-y { fill: #ffbd2e; }
    .title-dot-g { fill: #27c93f; }
    .title-text { fill: #888; font-size: 11px; }
  </style>

  <rect class="bg" width="720" height="180" rx="8"/>

  <!-- Title bar -->
  <rect class="title-bar" x="0" y="0" width="720" height="30" rx="8"/>
  <rect class="title-bar" x="0" y="16" width="720" height="14"/>
  <circle class="title-dot-r" cx="20" cy="15" r="5.5"/>
  <circle class="title-dot-y" cx="38" cy="15" r="5.5"/>
  <circle class="title-dot-g" cx="56" cy="15" r="5.5"/>
  <text class="title-text" x="360" y="19" text-anchor="middle">powerbar — Claude Code status line</text>

  <!-- Line 1: project · branch ↑2 +14 -3 ?1 · model -->
  <text y="62" x="20">
    <tspan class="white bold">my-project</tspan>
    <tspan class="dim"> · </tspan>
    <tspan class="green">main</tspan>
    <tspan> </tspan>
    <tspan class="yellow">↑2</tspan>
    <tspan> </tspan>
    <tspan class="cyan">+14 -3</tspan>
    <tspan> </tspan>
    <tspan class="dim">?1</tspan>
    <tspan class="dim"> · </tspan>
    <tspan class="dim">Opus 4.6</tspan>
  </text>

  <!-- Line 2: ctx bar · 5h bar · 7d bar · tasks -->
  <!-- ctx 34% (gradient) -->
  <text y="100" x="20">
    <tspan class="dim">ctx </tspan>
    <tspan class="green">●●●</tspan>
    <tspan class="dot-empty">○○○○○○○</tspan>
    <tspan class="white"> 34%</tspan>
    <tspan class="dim"> · </tspan>
    <!-- 5h 45% (pace: blue = under pace) -->
    <tspan class="dim">5h </tspan>
    <tspan class="blue">●●●●</tspan>
    <tspan class="dot-empty">○○○○○○</tspan>
    <tspan class="white"> 45%</tspan>
    <tspan class="dim"> (2h)</tspan>
    <tspan class="dim"> · </tspan>
    <!-- 7d 22% (pace: blue = under pace) -->
    <tspan class="dim">7d </tspan>
    <tspan class="blue">●●</tspan>
    <tspan class="dot-empty">○○○○○○○○</tspan>
    <tspan class="white"> 22%</tspan>
    <tspan class="dim"> (5d)</tspan>
  </text>

  <!-- Line 3: tasks -->
  <text y="138" x="20">
    <tspan class="dim">tasks </tspan>
    <tspan class="white">2/5</tspan>
    <tspan class="dim"> · </tspan>
    <tspan class="dim">cost </tspan>
    <tspan class="white">$1.24</tspan>
  </text>

</svg>
